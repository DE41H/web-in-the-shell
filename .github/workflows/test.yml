name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run tests
        run: uv run pytest tests/unit/ --cov=src --cov-report=term-missing --cov-fail-under=90 -m "not integration"
      - name: Integration tests (non-blocking)
        continue-on-error: true
        run: uv run pytest tests/integration/ -m integration
      - name: Lint
        run: uv run ruff check src/ tests/
