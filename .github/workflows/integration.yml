name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Unit tests
        run: uv run pytest -m "not integration" -q

      - name: Integration tests (mock only)
        run: uv run pytest -m "integration" -q --ignore=tests/integration/test_planner_executor_e2e.py
        env:
          NO_COLOR: "1"
